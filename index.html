<!DOCTYPE html>
<html lang="en" data-theme="dark" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Plan Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+Tibetan:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html[data-theme="light"]{
    --bg-0: #F7FAFF;
    --bg-1: #EFF4FC;
    --surface: rgba(255,255,255,0.60);
    --surface-strong: rgba(255,255,255,0.78);
    --border: rgba(37,99,235,0.16);
    --text: #101B34;
    --text-dim: #475569;
    --text-faint: #93A1B8;
    --accent-a: #2563EB;
    --accent-b: #38BDF8;
    --accent-grad: linear-gradient(120deg, #2563EB, #38BDF8);
    --shadow: 0 20px 50px rgba(37,99,235,0.14);
    --field-bg: rgba(255,255,255,0.60);
    --field-border: rgba(37,99,235,0.14);
    --field-focus: #2563EB;
    --text-on-accent: #F7FAFF;
    --scroll-thumb: rgba(37,99,235,0.20);
  }

  html[data-theme="dark"]{
    --bg-0: #0A0E1A;
    --bg-1: #121A2E;
    --surface: rgba(255,255,255,0.055);
    --surface-strong: rgba(255,255,255,0.10);
    --border: rgba(255,255,255,0.13);
    --text: #EEF1F8;
    --text-dim: #8D96AC;
    --text-faint: #5C6478;
    --accent-a: #7DD3FC;
    --accent-b: #A78BFA;
    --accent-grad: linear-gradient(120deg, #7DD3FC, #A78BFA);
    --shadow: 0 20px 60px rgba(0,0,0,0.45);
    --field-bg: rgba(255,255,255,0.05);
    --field-border: rgba(255,255,255,0.13);
    --field-focus: #7DD3FC;
    --text-on-accent: #0A0E1A;
    --scroll-thumb: rgba(255,255,255,0.14);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family:'Inter', 'Noto Sans Tibetan', sans-serif;
    color:var(--text);
    background:
      radial-gradient(1100px 700px at 12% -8%, rgba(37,99,235,0.10), transparent 60%),
      radial-gradient(900px 600px at 105% 10%, rgba(56,189,248,0.12), transparent 55%),
      radial-gradient(800px 700px at 50% 115%, rgba(167,139,250,0.06), transparent 55%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 60%, var(--bg-0));
    background-attachment:fixed;
    transition:background .4s ease, color .3s ease;
    position:relative;
    overflow-x:hidden;
  }
  html[data-theme="dark"] body{
    background:
      radial-gradient(1100px 700px at 12% -8%, rgba(125,211,252,0.16), transparent 60%),
      radial-gradient(900px 600px at 105% 10%, rgba(167,139,250,0.14), transparent 55%),
      radial-gradient(800px 700px at 50% 115%, rgba(56,189,248,0.08), transparent 55%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 60%, var(--bg-0));
  }
  html[data-lang="dz"] body{ font-family:'Noto Sans Tibetan','Inter',sans-serif; }

  h1,h2,h3,.display{ font-family:'Fraunces','Noto Sans Tibetan',serif; letter-spacing:0.01em; }
  html[data-lang="dz"] h1, html[data-lang="dz"] h2, html[data-lang="dz"] h3, html[data-lang="dz"] .display{
    font-family:'Noto Sans Tibetan', 'Fraunces', serif;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }

  .app{ position:relative; z-index:1; max-width:1360px; margin:0 auto; padding:22px 28px 64px; }

  /* ---------- header ---------- */
  header.top{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:14px 20px; border-radius:20px;
    background:var(--surface); border:1px solid var(--border);
    backdrop-filter:blur(24px) saturate(160%); -webkit-backdrop-filter:blur(24px) saturate(160%);
    box-shadow:var(--shadow); margin-bottom:22px;
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand svg{ width:32px; height:32px; flex-shrink:0; color:var(--accent-a); }
  .brand-text h1{
    margin:0; font-size:22px; font-weight:700; letter-spacing:0.01em;
    background:var(--accent-grad); -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .brand-text span{ font-size:11.5px; color:var(--text-faint); letter-spacing:.06em; text-transform:uppercase; }

  .controls{ display:flex; align-items:center; gap:10px; }
  .toggle{
    display:flex; align-items:center; gap:6px; background:var(--field-bg); border:1px solid var(--field-border);
    padding:4px; border-radius:999px; cursor:pointer; user-select:none;
  }
  .toggle button{
    border:none; background:transparent; color:var(--text-dim); font-size:12.5px; font-weight:600;
    padding:7px 13px; border-radius:999px; cursor:pointer; transition:all .25s ease; font-family:inherit;
  }
  .toggle button.active{ background:var(--accent-grad); color:var(--text-on-accent); box-shadow:0 4px 14px rgba(37,99,235,0.25); }
  .icon-btn{
    width:38px; height:38px; border-radius:12px; border:1px solid var(--field-border); background:var(--field-bg);
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text);
    transition:transform .2s ease, background .2s ease;
  }
  .icon-btn:hover{ transform:translateY(-1px); background:var(--surface-strong); }
  .icon-btn svg{ width:17px; height:17px; }

  /* ---------- tabs ---------- */
  .tabs{ display:flex; gap:8px; margin-bottom:20px; }
  .tab{
    padding:10px 18px; border-radius:12px; border:1px solid var(--field-border); background:var(--field-bg);
    color:var(--text-dim); font-weight:600; font-size:14px; cursor:pointer; font-family:inherit;
    transition:all .2s ease;
  }
  .tab.active{ background:var(--accent-grad); border-color:transparent; color:var(--text-on-accent); box-shadow:0 4px 14px rgba(37,99,235,0.22); }

  /* ---------- layout ---------- */
  .grid{ display:grid; grid-template-columns:1.05fr 1fr; gap:22px; align-items:start; }
  @media (max-width:980px){ .grid{ grid-template-columns:1fr; } }

  .glass{
    background:var(--surface); border:1px solid var(--border); border-radius:22px;
    backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px); box-shadow:var(--shadow);
    padding:26px;
  }
  .glass::before{ content:''; }

  .section-title{
    display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:700; letter-spacing:.09em;
    text-transform:uppercase; color:var(--accent-a); margin:26px 0 12px;
  }
  .section-title:first-child{ margin-top:0; }
  .section-title .rule{ flex:1; height:1px; background:linear-gradient(90deg, var(--border), transparent); }

  label{ display:block; font-size:12.5px; font-weight:600; color:var(--text-dim); margin-bottom:6px; }
  .field{ margin-bottom:14px; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .row3{ display:grid; grid-template-columns:1.3fr .8fr 1fr; gap:12px; }
  @media (max-width:560px){ .row2,.row3{ grid-template-columns:1fr; } }

  input[type=text], textarea, select{
    width:100%; background:var(--field-bg); border:1px solid var(--field-border); color:var(--text);
    padding:10px 12px; border-radius:11px; font-family:inherit; font-size:14px; resize:vertical;
    transition:border-color .2s ease, background .2s ease;
  }
  input[type=text]:focus, textarea:focus, select:focus{
    outline:none; border-color:var(--field-focus); background:var(--surface-strong);
  }
  textarea{ min-height:74px; line-height:1.5; }
  ::placeholder{ color:var(--text-faint); }

  .list-row{ display:flex; gap:8px; margin-bottom:8px; align-items:center; }
  .list-row input{ flex:1; }
  .mini-btn{
    width:34px; height:34px; flex-shrink:0; border-radius:9px; border:1px solid var(--field-border);
    background:var(--field-bg); color:var(--text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .mini-btn:hover{ color:var(--accent-a); border-color:var(--accent-a); }
  .add-link{
    display:inline-flex; align-items:center; gap:6px; background:transparent; border:1px dashed var(--field-border);
    color:var(--accent-a); font-weight:600; font-size:13px; padding:8px 12px; border-radius:10px; cursor:pointer;
    font-family:inherit;
  }
  .add-link:hover{ background:var(--field-bg); }

  .phase-card{
    border:1px solid var(--field-border); background:var(--field-bg); border-radius:16px; padding:16px; margin-bottom:14px;
  }
  .phase-head{ display:flex; gap:10px; align-items:flex-end; margin-bottom:10px; }
  .phase-head .field{ margin-bottom:0; flex:1; }
  .phase-head .time-field{ max-width:120px; }
  .phase-hint{ font-size:11.5px; color:var(--text-faint); margin-top:6px; }

  .btn-row{ display:flex; gap:10px; margin-top:22px; flex-wrap:wrap; }
  .btn{
    border:none; padding:12px 20px; border-radius:12px; font-weight:700; font-size:14px; cursor:pointer;
    display:inline-flex; align-items:center; gap:8px; font-family:inherit; transition:transform .15s ease, filter .15s ease;
  }
  .btn:active{ transform:scale(.97); }
  .btn-primary{ background:var(--accent-grad); color:var(--text-on-accent); box-shadow:0 6px 20px rgba(56,189,248,0.25); }
  .btn-primary:hover{ filter:brightness(1.08); transform:translateY(-1px); }
  .btn-ghost{ background:var(--field-bg); border:1px solid var(--field-border); color:var(--text); }
  .btn-ghost:hover{ background:var(--surface-strong); }
  .btn svg{ width:16px; height:16px; }

  /* ---------- preview / document ---------- */
  .preview-wrap{ position:sticky; top:20px; }
  .doc{
    background:#ffffff; color:#101B34; border-radius:16px; overflow:hidden;
    box-shadow:0 18px 40px rgba(15,23,42,0.28); border:1px solid rgba(15,23,42,0.06);
  }
  .doc-ribbon{
    background:linear-gradient(120deg, #2563EB, #38BDF8 85%);
    color:#F7FAFF; padding:20px 24px 18px; position:relative; overflow:hidden;
  }
  .doc-ribbon::after{
    content:''; position:absolute; right:-30px; top:-30px; width:140px; height:140px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.30), transparent 70%);
  }
  .doc-ribbon .eyebrow{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; opacity:.8; margin-bottom:6px; }
  .doc-ribbon h2{ margin:0 0 4px; font-size:22px; color:#ffffff; }
  .doc-ribbon .sub{ font-size:13px; opacity:.9; }
  .doc-body{ padding:22px 24px 26px; font-size:13.6px; line-height:1.62; }
  .doc-meta{ display:grid; grid-template-columns:1fr 1fr; gap:8px 20px; margin-bottom:16px; font-size:13px; }
  .doc-meta div b{ color:#2563EB; font-weight:700; }
  .doc-h{
    font-family:'Fraunces','Noto Sans Tibetan',serif; font-size:14.5px; font-weight:700; color:#1D4ED8;
    margin:16px 0 6px; padding-bottom:4px; border-bottom:1px solid rgba(37,99,235,0.2);
    display:flex; justify-content:space-between; align-items:baseline; gap:10px;
  }
  .doc-h .time{ font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:#0369A1; background:rgba(56,189,248,0.16); padding:2px 9px; border-radius:999px; white-space:nowrap; }
  .doc-p{ margin:0 0 8px; }
  .doc-ul{ margin:0 0 10px; padding-left:0; list-style:none; }
  .doc-ul li{ position:relative; padding-left:20px; margin-bottom:5px; }
  .doc-ul li::before{ content:''; position:absolute; left:0; top:6px; width:9px; height:9px; background:linear-gradient(120deg,#2563EB,#38BDF8); border-radius:2px; transform:rotate(45deg); }
  .doc-sub{ font-weight:700; color:#1E3A8A; margin:8px 0 4px; }
  .doc-empty{ color:#94A3B8; font-style:italic; }
  .doc a{ color:#2563EB; }

  /* ---------- saved plans ---------- */
  .saved-toolbar{ display:flex; gap:10px; margin-bottom:18px; align-items:center; flex-wrap:wrap; }
  .saved-toolbar input{ max-width:320px; }
  .card-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(270px,1fr)); gap:16px; }
  .plan-card{
    background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:18px;
    backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); box-shadow:var(--shadow);
    display:flex; flex-direction:column; gap:8px;
  }
  .plan-card .tag{ font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent-a); font-weight:700; }
  .plan-card h3{ margin:0; font-size:16.5px; color:var(--text); }
  .plan-card .meta{ font-size:12.5px; color:var(--text-dim); }
  .plan-card .actions{ display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .plan-card .actions .icon-btn{ width:32px; height:32px; }
  .plan-card .actions .icon-btn svg{ width:15px; height:15px; }

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--text-dim);
  }
  .empty-state svg{ width:52px; height:52px; margin-bottom:14px; opacity:.5; }

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
    background:var(--accent-grad); color:var(--text-on-accent); padding:12px 20px; border-radius:12px; font-weight:700; font-size:13.5px;
    box-shadow:0 12px 30px rgba(0,0,0,.3); transition:all .3s ease; z-index:50; pointer-events:none;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  ::-webkit-scrollbar{ width:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:var(--scroll-thumb); border-radius:10px; }
  ::-webkit-scrollbar-thumb:hover{ background:var(--accent-a); }
</style>
</head>
<body>

<div class="app">

  <header class="top">
    <div class="brand">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="23" stroke="currentColor" stroke-width="1.4" opacity="0.5"/>
        <path d="M24 10c-3 4-3 6 0 8c3-2 3-4 0-8Z M24 30c-3 4-3 6 0 8c3-2 3-4 0-8Z M10 24c4-3 6-3 8 0c-2 3-4 3-8 0Z M30 24c4-3 6-3 8 0c-2 3-4 3-8 0Z M17 17c1 4 3 5 6 3c-1-4-3-5-6-3Z M31 17c-1 4-3 5-6 3c1-4 3-5 6-3Z M17 31c1-4 3-5 6-3c-1 4-3 5-6 3Z M31 31c-1-4-3-5-6-3c1 4 3 5 6 3Z" fill="currentColor"/>
      </svg>
      <div class="brand-text">
        <h1 data-i18n="appTitle">Lesson Plan Studio</h1>
        <span data-i18n="appTagline">Crafted for the classroom</span>
      </div>
    </div>
    <div class="controls">
      <div class="toggle" id="langToggle">
        <button data-val="en" class="active">EN</button>
        <button data-val="dz">རྫོང་ཁ</button>
      </div>
      <div class="icon-btn" id="themeToggle" title="Toggle theme">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
      </div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="new" data-i18n="tabNew">New Plan</button>
    <button class="tab" data-tab="saved" data-i18n="tabSaved">Saved Plans</button>
  </div>

  <!-- ============ NEW PLAN VIEW ============ -->
  <div id="view-new">
    <div class="grid">

      <!-- FORM -->
      <div class="glass" id="formPane">

        <div class="section-title"><span data-i18n="secBasics">Lesson Details</span><span class="rule"></span></div>
        <div class="field">
          <label data-i18n="lessonTitle">Lesson Title</label>
          <input type="text" id="f_title" placeholder="e.g. Introduction to Information Literacy">
        </div>
        <div class="row3">
          <div class="field"><label data-i18n="subject">Subject</label><input type="text" id="f_subject" placeholder="ICT"></div>
          <div class="field"><label data-i18n="class">Class</label><input type="text" id="f_class" placeholder="VI"></div>
          <div class="field"><label data-i18n="duration">Duration</label><input type="text" id="f_duration" placeholder="50 minutes"></div>
        </div>
        <div class="row2">
          <div class="field"><label data-i18n="strand">Strand</label><input type="text" id="f_strand" placeholder="Safety and Ethics"></div>
          <div class="field"><label data-i18n="teacher">Teacher</label><input type="text" id="f_teacher" placeholder="Optional"></div>
        </div>
        <div class="field">
          <label data-i18n="competency">Competency</label>
          <textarea id="f_competency" placeholder="Exhibit good practices of..."></textarea>
        </div>
        <div class="field">
          <label data-i18n="topic">Topic</label>
          <input type="text" id="f_topic" placeholder="Topic of the lesson">
        </div>

        <div class="section-title"><span data-i18n="secObjectives">Objectives</span><span class="rule"></span></div>
        <div id="objectivesList"></div>
        <button class="add-link" data-add="objectives">+ <span data-i18n="addObjective">Add objective</span></button>

        <div class="section-title"><span data-i18n="secPrior">Prior Knowledge</span><span class="rule"></span></div>
        <div id="priorList"></div>
        <button class="add-link" data-add="prior">+ <span data-i18n="addPrior">Add point</span></button>

        <div class="section-title"><span data-i18n="secDescription">Lesson Description</span><span class="rule"></span></div>
        <div class="field">
          <textarea id="f_description" style="min-height:90px" placeholder="A short overview of how the lesson unfolds..."></textarea>
        </div>

        <div class="section-title"><span data-i18n="secStages">Lesson Stages</span><span class="rule"></span></div>
        <div id="phasesList"></div>
        <button class="add-link" data-add="phase">+ <span data-i18n="addPhase">Add stage</span></button>
        <div class="phase-hint" data-i18n="phaseHint">Tip: start a line with "- " for a bullet point, or "## " for a bold sub‑heading (e.g. Activity 1).</div>

        <div class="btn-row">
          <button class="btn btn-primary" id="btnSave">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
            <span data-i18n="save">Save Plan</span>
          </button>
          <button class="btn btn-ghost" id="btnExport">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
            <span data-i18n="exportWord">Export to Word</span>
          </button>
          <button class="btn btn-ghost" id="btnNew">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            <span data-i18n="newBtn">Clear</span>
          </button>
        </div>
      </div>

      <!-- PREVIEW -->
      <div class="preview-wrap">
        <div class="section-title" style="margin-top:0"><span data-i18n="preview">Preview</span><span class="rule"></span></div>
        <div class="doc" id="docPreview"></div>
      </div>

    </div>
  </div>

  <!-- ============ SAVED PLANS VIEW ============ -->
  <div id="view-saved" style="display:none">
    <div class="saved-toolbar">
      <input type="text" id="searchSaved" placeholder="Search saved plans...">
    </div>
    <div id="savedGrid" class="card-grid"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){

/* ---------------- i18n ---------------- */
const I18N = {
  en:{
    appTitle:"Lesson Plan Studio", appTagline:"Crafted for the classroom",
    tabNew:"New Plan", tabSaved:"Saved Plans",
    secBasics:"Lesson Details", lessonTitle:"Lesson Title", subject:"Subject", class:"Class", duration:"Duration",
    strand:"Strand", teacher:"Teacher", competency:"Competency", topic:"Topic",
    secObjectives:"Objectives", addObjective:"Add objective",
    secPrior:"Prior Knowledge", addPrior:"Add point",
    secDescription:"Lesson Description",
    secStages:"Lesson Stages", addPhase:"Add stage",
    phaseHint:'Tip: start a line with "- " for a bullet point, or "## " for a bold sub-heading (e.g. Activity 1).',
    save:"Save Plan", exportWord:"Export to Word", newBtn:"Clear",
    preview:"Preview",
    stageName:"Stage name", stageTime:"Time", stageContent:"Content",
    savedEmpty:"No saved lesson plans yet — save one from “New Plan” to see it here.",
    open:"Open", duplicate:"Duplicate", del:"Delete", exportShort:"Word",
    confirmDelete:"Delete this lesson plan? This can't be undone.",
    savedToast:"Lesson plan saved", deletedToast:"Lesson plan deleted", duplicatedToast:"Duplicated",
    docUntitled:"Untitled Lesson", docSubject:"Subject", docClass:"Class", docDuration:"Duration", docStrand:"Strand",
    docCompetency:"Competency", docTopic:"Topic", docObjectives:"Objectives",
    docPrior:"Prior Knowledge", docDescription:"Lesson Description",
    emptyPreviewHint:"Fill in the form to see your lesson plan take shape here.",
    searchPlaceholder:"Search saved plans..."
  },
  dz:{

/* ---------------- storage ---------------- */
async function loadSaved(){
  try{
    const res = await window.storage.get('lessonplans', false);
    savedPlans = res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    savedPlans = [];
  }
}
async function persistSaved(){
  try{
    await window.storage.set('lessonplans', JSON.stringify(savedPlans), false);
    return true;
  }catch(e){
    console.error('storage error', e);
    return false;
  }
}

function bindSimpleFields(){

    const el = document.getElementById(fieldIdMap[key]);

function renderStringList(containerId, key){
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = '';

    row.className = 'list-row';

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return escHtml(s).replace(/"/g,'&quot;'); }

/* ---------------- content parsing for preview/export ---------------- */
function linkify(text){
  return text.replace(/(https?:\/\/[^\s]+)/g, url=>`<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
}
function inlineBold(text){
  return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}
function renderContentBlock(raw){
  if(!raw || !raw.trim()) return `<p class="doc-empty">—</p>`;
  const lines = raw.split('\n');
  let html = ''; let ulOpen = false;
  const closeUl = ()=>{ if(ulOpen){ html += '</ul>'; ulOpen=false; } };
  lines.forEach(line=>{
    const trimmed = line.trim();
    if(trimmed === ''){ closeUl(); return; }
    if(trimmed.startsWith('## ')){
      closeUl();
      html += `<div class="doc-sub">${inlineBold(linkify(escHtml(trimmed.slice(3))))}</div>`;
    } else if(trimmed.startsWith('- ') || trimmed.startsWith('• ')){
      if(!ulOpen){ html += '<ul class="doc-ul">'; ulOpen = true; }
      html += `<li>${inlineBold(linkify(escHtml(trimmed.slice(2))))}</li>`;
    } else {
      closeUl();
      html += `<p class="doc-p">${inlineBold(linkify(escHtml(trimmed)))}</p>`;
    }
  });
  closeUl();
  return html;
}
function renderBulletArray(arr){
  const items = arr.filter(x=>x && x.trim());
  if(items.length===0) return `<p class="doc-empty">—</p>`;
  return `<ul class="doc-ul">${items.map(i=>`<li>${inlineBold(linkify(escHtml(i)))}</li>`).join('')}</ul>`;
}

/* ---------------- save / new / duplicate / delete ---------------- */
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>el.classList.remove('show'), 2200);
}

async function savePlan(){
  plan.updatedAt = Date.now();
  const idx = savedPlans.findIndex(p=>p.id===plan.id);
  if(idx>=0){ savedPlans[idx] = JSON.parse(JSON.stringify(plan)); }
  else{ savedPlans.unshift(JSON.parse(JSON.stringify(plan))); }
  const ok = await persistSaved();
  if(ok){ toast(t('savedToast')); renderSaved(); }
}

function newPlan(){
  plan = blankPlan();
  editingExistingId = null;
  bindSimpleFields(); renderObjectives(); renderPrior(); renderPhases(); renderPreview();
}

function loadPlanIntoForm(p){
  plan = JSON.parse(JSON.stringify(p));
  editingExistingId = p.id;
  bindSimpleFields(); renderObjectives(); renderPrior(); renderPhases(); renderPreview();
  switchTab('new');
}

async function deletePlan(id){
  if(!confirm(t('confirmDelete'))) return;
  savedPlans = savedPlans.filter(p=>p.id!==id);
  await persistSaved();
  toast(t('deletedToast'));
  renderSaved();
}

async function duplicatePlan(id){
  const src = savedPlans.find(p=>p.id===id);
  if(!src) return;
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = 'lp_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
  copy.title = (copy.title || t('docUntitled')) + ' (copy)';
  copy.createdAt = Date.now(); copy.updatedAt = Date.now();
  savedPlans.unshift(copy);
  await persistSaved();
  toast(t('duplicatedToast'));
  renderSaved();
}

/* ---------------- saved list rendering ---------------- */
function renderSaved(){
  const grid = document.getElementById('savedGrid');
  const q = (document.getElementById('searchSaved').value || '').toLowerCase().trim();
  const list = savedPlans.filter(p=>{
    if(!q) return true;
    return [p.title,p.subject,p.className,p.topic].join(' ').toLowerCase().includes(q);
  });
  if(list.length===0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16v16H4z" opacity=".0"/><path d="M6 3h9l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"/><path d="M9 12h6M9 16h6M9 8h3"/></svg>
      <div>${t('savedEmpty')}</div>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(p=>{
    const d = new Date(p.updatedAt||p.createdAt);
    return `
    <div class="plan-card">
      <div class="tag">${escHtml(p.subject)||'—'}${p.className? ' · '+escHtml(p.className):''}</div>
      <h3>${escHtml(p.title) || t('docUntitled')}</h3>
      <div class="meta">${escHtml(p.topic)||''}</div>
      <div class="meta">${d.toLocaleDateString()}</div>
      <div class="actions">
        <button class="icon-btn" data-act="open" data-id="${p.id}" title="${t('open')}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS.edit}</svg></button>
        <button class="icon-btn" data-act="dup" data-id="${p.id}" title="${t('duplicate')}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS.copy}</svg></button>
        <button class="icon-btn" data-act="word" data-id="${p.id}" title="${t('exportShort')}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS.download}</svg></button>
        <button class="icon-btn" data-act="del" data-id="${p.id}" title="${t('del')}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS.trash}</svg></button>
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('[data-act]').forEach(btn=>{
    const id = btn.getAttribute('data-id');
    const act = btn.getAttribute('data-act');
    btn.onclick = ()=>{
      const p = savedPlans.find(x=>x.id===id);
      if(act==='open'){ loadPlanIntoForm(p); }
      else if(act==='dup'){ duplicatePlan(id); }
      else if(act==='del'){ deletePlan(id); }
      else if(act==='word'){ exportWord(p); }
    };
  });
}

function contentToWordHtml(raw){
  if(!raw || !raw.trim()) return '<p>—</p>';
  const lines = raw.split('\n'); let html=''; let ulOpen=false;
  const closeUl = ()=>{ if(ulOpen){ html+='</ul>'; ulOpen=false; } };
  lines.forEach(line=>{
    const trimmed = line.trim();
    if(trimmed===''){ closeUl(); return; }
    if(trimmed.startsWith('## ')){ closeUl(); html+=`<div class="sub-h">${inlineBold(escHtml(trimmed.slice(3)))}</div>`; }
    else if(trimmed.startsWith('- ')||trimmed.startsWith('• ')){ if(!ulOpen){html+='<ul>';ulOpen=true;} html+=`<li>${inlineBold(escHtml(trimmed.slice(2)))}</li>`; }
    else { closeUl(); html+=`<p>${inlineBold(escHtml(trimmed))}</p>`; }
  });
  closeUl();
  return html;
}
function bulletArrayToWordHtml(arr){
  const items = arr.filter(x=>x && x.trim());
  if(items.length===0) return '<p>—</p>';
  return `<ul>${items.map(i=>`<li>${inlineBold(escHtml(i))}</li>`).join('')}</ul>`;
}

function exportWord(p){
  const html = planToDocHtml(p);
  const blob = new Blob(['\ufeff', html], {type:'application/msword'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeName = (p.title || 'lesson-plan').replace(/[^\w\-]+/g,'_').slice(0,60);
  a.href = url; a.download = safeName + '.doc';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}

/* ---------------- tabs / theme / lang wiring ---------------- */
function switchTab(name){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.getAttribute('data-tab')===name));
  document.getElementById('view-new').style.display = name==='new' ? '' : 'none';
  document.getElementById('view-saved').style.display = name==='saved' ? '' : 'none';
  if(name==='saved') renderSaved();
}
document.querySelectorAll('.tab').forEach(b=> b.onclick = ()=>switchTab(b.getAttribute('data-tab')) );

function setTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  const icon = document.getElementById('themeIcon');
  icon.innerHTML = theme==='dark' ? ICONS.moon : ICONS.sun;
}
let theme = 'dark';
setTheme(theme);
document.getElementById('themeToggle').onclick = ()=>{
  theme = theme==='dark' ? 'light' : 'dark';
  setTheme(theme);
};

document.getElementById('langToggle').querySelectorAll('button').forEach(btn=>{
  btn.onclick = ()=>{
    lang = btn.getAttribute('data-val');
    document.getElementById('langToggle').querySelectorAll('button').forEach(b=>b.classList.toggle('active', b===btn));
    applyI18n();
  };
});

document.getElementById('btnSave').onclick = savePlan;
document.getElementById('btnNew').onclick = ()=>{ if(confirm(lang==='dz'?'འཆར་གཞི་གསར་བསྐྲུན་འབད་ནི་ཨིན་ན?':'Start a new blank plan? Unsaved changes will be lost.')) newPlan(); };
document.getElementById('btnExport').onclick = ()=> exportWord(plan);
document.getElementById('searchSaved').oninput = renderSaved;
document.querySelectorAll('.add-link').forEach(btn=>{
  btn.onclick = ()=>{
    const kind = btn.getAttribute('data-add');
    if(kind==='objectives'){ plan.objectives.push(''); renderObjectives(); }
    else if(kind==='prior'){ plan.prior.push(''); renderPrior(); }
    else if(kind==='phase'){ plan.phases.push({name:'', time:'', content:''}); renderPhases(); }
    renderPreview();
  };
});

/* ---------------- init ---------------- */
async function init(){
  document.getElementById('docPreview').innerHTML = `<div class="doc-body"><p class="doc-empty">${t('emptyPreviewHint')}</p></div>`;
  bindSimpleFields();
  renderObjectives(); renderPrior(); renderPhases(); renderPreview();
  await loadSaved();
  renderSaved();
}
init();

})();
</script>
